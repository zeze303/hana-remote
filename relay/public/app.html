<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>hana-remote</title>
<link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div id="app">
  <!-- 顶部栏 -->
  <header id="topbar">
    <div class="topbar-left">
      <span class="brand">hana-remote</span>
    </div>
    <div class="topbar-center">
      <span id="statusDot" class="dot gray"></span>
      <span id="statusLabel">连接中...</span>
    </div>
    <div class="topbar-right">
      <label class="mode-switch" title="浏览模式只读，编辑模式可保存">
        <span id="modeLabel">浏览</span>
        <div class="toggle">
          <input type="checkbox" id="modeToggle">
          <div class="toggle-track"></div>
          <div class="toggle-knob"></div>
        </div>
        <span id="modeLabelEdit">编辑</span>
      </label>
      <span class="topbar-sep"></span>
      <button id="logoutBtn" class="topbar-btn" title="退出登录">退出</button>
    </div>
  </header>

  <div id="body">
    <!-- 左侧：文件树 -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">文件</span>
        <button id="refreshTreeBtn" class="icon-btn" title="刷新">↻</button>
      </div>
      <div class="search-bar">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5.5" stroke="#888" stroke-width="1.5"/><line x1="11" y1="11" x2="14.5" y2="14.5" stroke="#888" stroke-width="1.5" stroke-linecap="round"/></svg>
        <input type="text" id="searchInput" class="search-input" placeholder="搜索文件..." spellcheck="false">
        <button id="searchClearBtn" class="search-clear" hidden>✕</button>
      </div>
      <div id="fileTree" class="file-tree"></div>
      <div id="searchResults" class="search-results" hidden></div>
    </aside>

    <!-- 拖动条1 -->
    <div id="splitter" class="splitter"></div>

    <!-- 中间：标签页内容 -->
    <main id="content">
      <div id="tabBar" class="tab-bar">
        <div class="tabs" id="tabs"></div>
      </div>
      <div id="panels">
        <!-- 欢迎/空状态 -->
        <div id="welcome" class="panel active">
          <div class="welcome-content">
            <svg width="64" height="64" viewBox="0 0 48 48" fill="none">
              <rect x="8" y="14" width="32" height="24" rx="4" stroke="#6366f1" stroke-width="2" opacity="0.4"/>
              <circle cx="18" cy="26" r="3" fill="#6366f1" opacity="0.3"/>
              <circle cx="30" cy="26" r="3" fill="#6366f1" opacity="0.3"/>
            </svg>
            <p>选择文件开始浏览或编辑</p>
          </div>
        </div>
        <!-- 文件编辑器面板（动态生成） -->
      </div>
    </main>

    <!-- 拖动条2 -->
    <div id="chatSplitter" class="splitter"></div>

    <!-- 右侧：聊天面板 -->
    <aside id="chatPanel">
      <div class="sidebar-header">
        <span class="sidebar-title">💬 对话</span>
        <span class="sidebar-badge" id="chatBadge"></span>
      </div>
      <div id="chatMessages" class="chat-messages"></div>
      <div class="chat-input-area">
        <textarea id="chatInput" class="chat-input" rows="2" placeholder="输入消息..." disabled></textarea>
        <button id="chatSendBtn" class="btn-primary" disabled>发送</button>
      </div>
    </aside>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
<script src="/js/app.js"></script>
</body>
</html>

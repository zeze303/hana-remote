<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>hana-remote</title>
<link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div id="app">
  <!-- 顶部栏 -->
  <header id="topbar">
    <div class="topbar-left">
      <span class="brand">hana-remote</span>
    </div>
    <div class="topbar-center">
      <span id="statusDot" class="dot gray"></span>
      <span id="statusLabel">连接中...</span>
    </div>
    <div class="topbar-right">
      <label class="mode-switch" title="浏览模式只读，编辑模式可保存">
        <span id="modeLabel">浏览</span>
        <div class="toggle">
          <input type="checkbox" id="modeToggle">
          <div class="toggle-track"></div>
          <div class="toggle-knob"></div>
        </div>
        <span id="modeLabelEdit">编辑</span>
      </label>
      <button id="chatBtn" class="topbar-btn" title="聊天">💬</button>
      <span class="topbar-sep"></span>
      <button id="logoutBtn" class="topbar-btn" title="退出登录">退出</button>
    </div>
  </header>

  <div id="body">
    <!-- 左侧：文件树 -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">文件</span>
        <button id="refreshTreeBtn" class="icon-btn" title="刷新">↻</button>
      </div>
      <div id="fileTree" class="file-tree"></div>
    </aside>

    <!-- 拖动条 -->
    <div id="splitter"></div>

    <!-- 右侧：标签页内容 -->
    <main id="content">
      <div id="tabBar" class="tab-bar">
        <div class="tabs" id="tabs"></div>
      </div>
      <div id="panels">
        <!-- 欢迎/空状态 -->
        <div id="welcome" class="panel active">
          <div class="welcome-content">
            <svg width="64" height="64" viewBox="0 0 48 48" fill="none">
              <rect x="8" y="14" width="32" height="24" rx="4" stroke="#6366f1" stroke-width="2" opacity="0.4"/>
              <circle cx="18" cy="26" r="3" fill="#6366f1" opacity="0.3"/>
              <circle cx="30" cy="26" r="3" fill="#6366f1" opacity="0.3"/>
            </svg>
            <p>选择左侧文件开始浏览</p>
            <p class="hint">或点击右上角聊天按钮对话</p>
          </div>
        </div>

        <!-- 聊天面板 -->
        <div id="panel_chat_tab" class="panel">
          <div id="chatMessages" class="chat-messages"></div>
          <div class="chat-input-area">
            <textarea id="chatInput" class="chat-input" rows="2" placeholder="输入消息..." disabled></textarea>
            <button id="chatSendBtn" class="btn-primary" disabled>发送</button>
          </div>
        </div>

        <!-- 文件编辑器面板（动态生成） -->
      </div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
<script src="/js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hana-remote</title>
<link rel="stylesheet" href="/css/login.css">
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <div class="logo">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <rect x="8" y="14" width="32" height="24" rx="4" stroke="#6366f1" stroke-width="2"/>
        <circle cx="18" cy="26" r="3" fill="#6366f1" opacity="0.6"/>
        <circle cx="30" cy="26" r="3" fill="#6366f1" opacity="0.6"/>
        <path d="M24 29c-2 0-4-1-4-3" stroke="#6366f1" stroke-width="1.5"/>
        <line x1="18" y1="14" x2="14" y2="8" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="30" y1="14" x2="34" y2="8" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>hana-remote</h1>
    <p class="subtitle">远程控制面板</p>
    <div class="input-group">
      <input type="password" id="password" placeholder="输入密码" autofocus>
    </div>
    <button id="loginBtn" onclick="login()">登录</button>
    <p id="errorMsg" class="error hidden"></p>
    <p class="status" id="statusText">检查连接...</p>
  </div>
</div>
<script src="/js/login.js"></script>
</body>
</html>
